<style>
:root{--green:#25D366;--glow:rgba(37,211,102,0.13);--black:#090c0a;--dark:#0f1410;--card:#131813;--card2:#161d17;--border:rgba(255,255,255,0.07);--text:#eef2ef;--muted:#6b7d70;--accent:#FFD60A;--fire:#FF6B35;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}

@keyframes fd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gp{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pop{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,12,10,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-logo-box{width:34px;height:34px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 14px rgba(37,211,102,0.3);}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
.nav-logo-text span{color:var(--green);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-ver{font-size:10px;background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.25);color:var(--accent);padding:3px 8px;border-radius:100px;font-weight:700;}
.nav-cta{background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:9px 18px;border-radius:10px;text-decoration:none;transition:transform .15s;}
.nav-cta:hover{transform:translateY(-1px);}

section{position:relative;z-index:1;padding:90px 20px;}
.wrap{max-width:900px;margin:0 auto;}
.wrap-sm{max-width:680px;margin:0 auto;}
.center{text-align:center;}
.sec-tag{display:inline-flex;align-items:center;gap:6px;background:var(--glow);border:1px solid rgba(37,211,102,.2);border-radius:100px;padding:4px 13px;font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:16px;}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;line-height:1.15;letter-spacing:-0.02em;margin-bottom:14px;}
.sec-title em{font-style:normal;color:var(--green);}
.sec-sub{color:var(--muted);font-size:15.5px;line-height:1.7;max-width:520px;}

.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 20px 80px;overflow:hidden;}
.hero-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:600px;background:radial-gradient(ellipse,rgba(37,211,102,0.12) 0%,transparent 65%);pointer-events:none;animation:gp 7s ease-in-out infinite;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--glow);border:1px solid rgba(37,211,102,.22);border-radius:100px;padding:6px 16px;font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:24px;animation:fd .6s ease both;}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.6s infinite;display:inline-block;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,4.2rem);font-weight:800;line-height:1.05;letter-spacing:-0.03em;animation:fd .6s .1s ease both;}
.hero h1 em{font-style:normal;color:var(--green);display:block;}
.hero-sub{margin:18px auto 0;max-width:540px;color:var(--muted);font-size:clamp(14px,2.5vw,17px);line-height:1.7;animation:fd .6s .18s ease both;}
.hero-sub strong{color:var(--text);}
.hero-stats{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:24px;animation:fd .6s .24s ease both;}
.stat-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12.5px;color:var(--muted);}
.stat-pill strong{color:var(--text);font-weight:600;}
.hero-btns{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:32px;animation:fd .6s .3s ease both;}
.btn-main{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;padding:15px 26px;border-radius:14px;text-decoration:none;transition:transform .15s,box-shadow .15s;}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(37,211,102,.36);}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--text);font-size:14px;padding:14px 22px;border-radius:14px;text-decoration:none;border:1px solid var(--border);transition:all .15s;}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);}
.hero-note{margin-top:14px;font-size:12px;color:var(--muted);animation:fd .6s .36s ease both;}
.hero-preview{margin:28px auto 0;background:rgba(255,255,255,.03);border:1px solid rgba(37,211,102,.22);border-radius:18px;padding:18px 20px;max-width:440px;text-align:left;animation:fd .6s .42s ease both;}
.preview-label{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.preview-msg{font-size:13px;line-height:1.8;white-space:pre-wrap;color:#b8c9bc;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px;}
.preview-footer{font-size:11px;color:var(--muted);margin-top:10px;text-align:center;}

.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px;}
.prob-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;transition:border-color .2s;}
.prob-card:hover{border-color:rgba(255,107,53,.3);}
.prob-icon{font-size:28px;margin-bottom:11px;}
.prob-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:7px;}
.prob-desc{color:var(--muted);font-size:13.5px;line-height:1.6;}

.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px;}
.ba-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;}
.ba-card.bad{border-color:rgba(255,70,70,.22);}
.ba-card.good{border-color:rgba(37,211,102,.35);}
.ba-lbl{display:inline-block;margin-bottom:14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 10px;border-radius:100px;}
.ba-lbl.bad{background:rgba(255,70,70,.1);color:#ff6b6b;}
.ba-lbl.good{background:var(--glow);color:var(--green);}
.ba-msg{font-size:13.5px;line-height:1.75;white-space:pre-wrap;color:#b8c9bc;}
.ba-card.bad .ba-msg{color:#666;}
.ba-q{text-align:center;margin-top:16px;color:var(--muted);font-size:14px;font-weight:500;}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:44px;}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;position:relative;}
.step-num{width:44px;height:44px;border-radius:50%;background:var(--glow);border:1px solid rgba(37,211,102,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--green);margin:0 auto 14px;}
.step-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:8px;}
.step-desc{color:var(--muted);font-size:13.5px;line-height:1.6;}
.step-arr{position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);}

.use-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:44px;}
.use-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;transition:border-color .2s,transform .2s;}
.use-card:hover{border-color:rgba(37,211,102,.28);transform:translateY(-3px);}
.use-icon{font-size:26px;margin-bottom:9px;}
.use-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:5px;}
.use-desc{font-size:12px;color:var(--muted);line-height:1.55;}

.feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:44px;}
.feat-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;gap:14px;align-items:flex-start;transition:border-color .2s;}
.feat-card:hover{border-color:rgba(37,211,102,.25);}
.feat-icon{width:42px;height:42px;flex-shrink:0;background:var(--glow);border:1px solid rgba(37,211,102,.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.feat-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:5px;}
.feat-desc{color:var(--muted);font-size:13px;line-height:1.6;}

.who-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:36px;}
.who-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 14px;text-align:center;transition:border-color .2s,transform .2s;}
.who-card:hover{border-color:rgba(37,211,102,.28);transform:translateY(-3px);}
.who-icon{font-size:26px;margin-bottom:7px;}
.who-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;}

.country-pills{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:28px;}
.cpill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:500;}

.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px;}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;}
.price-card.pro{border-color:rgba(255,214,10,.28);background:linear-gradient(145deg,#161d17,#1a2218);}
.price-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:8px;}
.price-free .price-lbl{color:var(--green);}
.price-pro .price-lbl{color:var(--accent);}
.price-amt{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:4px;}
.price-note{color:var(--muted);font-size:13px;margin-bottom:22px;}
.price-list{list-style:none;margin-bottom:24px;}
.price-list li{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.price-list li:last-child{border-bottom:none;}
.btn-pfree{display:block;text-align:center;width:100%;padding:13px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;border-radius:12px;text-decoration:none;transition:transform .15s;}
.btn-pfree:hover{transform:translateY(-2px);}
.btn-ppro{display:block;text-align:center;width:100%;padding:13px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;border-radius:12px;border:none;cursor:pointer;transition:transform .15s;}
.btn-ppro:hover{transform:translateY(-2px);}

#tool{background:var(--dark);border-top:2px solid rgba(37,211,102,.2);}
.tool-inner{max-width:680px;margin:0 auto;}
.usage-row{display:flex;justify-content:center;margin-bottom:20px;}
.usage-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,214,10,.07);border:1px solid rgba(255,214,10,.22);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:600;}

.type-card,.toggle-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;}
.type-label,.toggle-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:12px;}
.type-grid,.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.type-opt,.style-opt{padding:14px 10px;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;color:var(--muted);user-select:none;}
.type-opt:hover,.style-opt:hover{border-color:rgba(255,255,255,.16);color:var(--text);}
.type-opt.sel{background:var(--glow);border-color:rgba(37,211,102,.42);color:var(--green);}
.t-icon,.s-icon{font-size:22px;display:block;margin-bottom:5px;}
.t-name,.s-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;display:block;}
.t-desc,.s-desc{font-size:11px;margin-top:3px;opacity:.65;display:block;}
.style-opt.sel-fire{background:rgba(255,107,53,.09);border-color:rgba(255,107,53,.48);color:var(--fire);}
.style-opt.sel-global{background:var(--glow);border-color:rgba(37,211,102,.42);color:var(--green);}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 22px 24px;margin-bottom:12px;transition:border-color .25s;}
.form-card:focus-within{border-color:rgba(37,211,102,.28);}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.sec-num{width:27px;height:27px;border-radius:50%;flex-shrink:0;background:var(--glow);border:1px solid rgba(37,211,102,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--green);}
.sec-ttl{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:7px;}
.opt{font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);background:rgba(37,211,102,.04);}
.field input::placeholder,.field textarea::placeholder{color:#2e3830;}
.field select option{background:#181f19;color:var(--text);}
.field input.err,.field select.err,.field textarea.err{border-color:#ff4545!important;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.row-2 .field{margin-bottom:0;}
.field-hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.hidden{display:none!important;}

.btn-gen{width:100%;padding:15px 20px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;border:none;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(37,211,102,.33);}
.loader{display:none;align-items:center;justify-content:center;gap:9px;padding:15px;color:var(--green);font-size:14px;}
.loader.show{display:flex;}
.spin{width:18px;height:18px;border:2px solid rgba(37,211,102,.2);border-top-color:var(--green);border-radius:50%;animation:sp .65s linear infinite;}

#outputSection{display:none;animation:fu .45s ease both;}
.out-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:12px;}
.out-card.hi{border-color:rgba(37,211,102,.36);}
.out-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:8px;}
.out-top h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.style-chip{font-size:10px;padding:3px 9px;border-radius:100px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.chip-fire{background:rgba(255,107,53,.14);color:var(--fire);border:1px solid rgba(255,107,53,.28);}
.chip-global{background:var(--glow);color:var(--green);border:1px solid rgba(37,211,102,.28);}
.btn-copy{flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap;}
.btn-copy:hover{background:rgba(255,255,255,.11);}
.btn-copy.ok{color:var(--green);border-color:rgba(37,211,102,.38);}
.out-msg{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:14px;font-size:14px;line-height:1.8;white-space:pre-wrap;color:#b8c9bc;word-break:break-word;}
.link-box{background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--green);word-break:break-all;font-family:monospace;margin-bottom:12px;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;border:none;border-radius:12px;cursor:pointer;text-decoration:none;transition:transform .15s,box-shadow .15s;}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,211,102,.36);}
.btn-reset{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-reset:hover{border-color:rgba(255,255,255,.18);color:var(--text);}

.feedback-box{margin-top:16px;background:var(--card);border:1px solid rgba(37,211,102,.18);border-radius:20px;padding:26px 22px;}
.feedback-header{text-align:center;margin-bottom:22px;}
.feedback-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;}
.feedback-sub{font-size:13px;color:var(--muted);line-height:1.55;}
.fb-q{margin-bottom:20px;}
.fb-q-label{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.fb-chips{display:flex;flex-wrap:wrap;gap:8px;}
.fb-chip{padding:8px 14px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:100px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none;}
.fb-chip:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.fb-chip.sel{background:var(--glow);border-color:rgba(37,211,102,.5);color:var(--green);font-weight:600;}
.fb-textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:80px;line-height:1.6;transition:border-color .2s;}
.fb-textarea:focus{border-color:var(--green);background:rgba(37,211,102,.04);}
.fb-textarea::placeholder{color:#2e3830;}
.btn-send-fb{width:100%;padding:14px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:6px;}
.btn-send-fb:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3);}
.btn-send-fb:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.fb-success{display:none;margin-top:18px;padding:22px;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);border-radius:14px;text-align:center;}
.fb-success.show{display:block;animation:fu .4s ease both;}
.fb-success-icon{font-size:38px;margin-bottom:10px;}
.fb-success-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--green);margin-bottom:8px;}
.fb-success-msg{font-size:13px;color:var(--muted);line-height:1.6;}
.share-divider{height:1px;background:var(--border);margin:22px 0;}
.share-line{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6;text-align:center;}
.btn-share{width:100%;padding:13px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;}
.btn-share:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e2b20;border:1px solid rgba(37,211,102,.3);border-radius:100px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sticky-cta{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99;display:none;}
.sticky-btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;padding:14px 24px;border-radius:100px;text-decoration:none;box-shadow:0 8px 28px rgba(37,211,102,.4);white-space:nowrap;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:#161d17;border:1px solid rgba(255,214,10,.26);border-radius:24px;padding:36px 26px;max-width:400px;width:100%;text-align:center;animation:pop .3s cubic-bezier(.34,1.56,.64,1) both;}
.m-icon{font-size:50px;margin-bottom:14px;}
.m-badge{display:inline-block;margin-bottom:16px;background:rgba(255,214,10,.09);border:1px solid rgba(255,214,10,.26);border-radius:100px;padding:6px 18px;font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.modal h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:10px;}
.modal p{color:var(--muted);font-size:14px;line-height:1.65;margin-bottom:20px;}
.pro-list{list-style:none;text-align:left;margin-bottom:22px;}
.pro-list li{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text);}
.pro-list li:last-child{border-bottom:none;}
.btn-up{width:100%;padding:14px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;border:none;border-radius:12px;cursor:pointer;transition:transform .15s;}
.btn-up:hover{transform:translateY(-2px);}
.btn-mc{width:100%;padding:10px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-top:8px;font-family:'DM Sans',sans-serif;}

footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:28px 20px;text-align:center;}
.f-logo{display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;text-decoration:none;}
.f-logo-box{width:28px;height:28px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.f-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);}
.f-logo-text span{color:var(--green);}
.f-copy{font-size:12px;color:#2a3a2e;}
.f-copy a{color:var(--green);text-decoration:none;}
.f-ver{font-size:11px;color:#1a2e1e;margin-top:4px;}

@media(max-width:640px){
  .problem-grid,.ba-grid,.feat-grid,.price-grid{grid-template-columns:1fr;}
  .steps,.use-grid{grid-template-columns:1fr;}
  .step-arr{display:none;}
  .who-grid{grid-template-columns:repeat(2,1fr);}
  .row-2{grid-template-columns:1fr;}
  nav{padding:12px 16px;}
  .hero h1{font-size:1.9rem;}
  .sticky-cta{display:block;}
}

/* ===== PHONE MOCKUP ===== */
.demo-section{background:var(--dark);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.phone-wrap{display:flex;align-items:center;justify-content:center;gap:60px;flex-wrap:wrap;margin-top:48px;}
.phone-frame{width:240px;flex-shrink:0;background:#1a1a1a;border-radius:36px;padding:14px;box-shadow:0 0 0 2px #2a2a2a,0 24px 60px rgba(0,0,0,0.6),0 0 40px rgba(37,211,102,0.08);}
.phone-notch{width:70px;height:10px;background:#2a2a2a;border-radius:100px;margin:0 auto 10px;}
.phone-screen{background:#0b1410;border-radius:22px;overflow:hidden;min-height:380px;}
.phone-topbar{background:#075e54;padding:10px 14px;display:flex;align-items:center;gap:9px;}
.phone-avatar{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.phone-contact{flex:1;}
.phone-name{font-size:12px;font-weight:700;color:#fff;}
.phone-status{font-size:10px;color:rgba(255,255,255,.6);}
.phone-body{padding:12px 10px;display:flex;flex-direction:column;gap:8px;}
.bubble{max-width:88%;padding:10px 12px;border-radius:12px;font-size:11.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.bubble.them{background:#1f2c34;color:#e9edef;border-bottom-left-radius:3px;align-self:flex-start;}
.bubble.me{background:#005c4b;color:#e9edef;border-bottom-right-radius:3px;align-self:flex-end;}
.bubble-time{font-size:9px;color:rgba(255,255,255,.38);text-align:right;margin-top:4px;}
.phone-home{width:60px;height:4px;background:#2a2a2a;border-radius:100px;margin:10px auto 0;}

.demo-points{flex:1;min-width:260px;max-width:380px;}
.demo-point{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;}
.demo-point-icon{width:40px;height:40px;flex-shrink:0;background:var(--glow);border:1px solid rgba(37,211,102,.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.demo-point-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;}
.demo-point-desc{font-size:13px;color:var(--muted);line-height:1.55;}

/* ===== SOCIAL PROOF ===== */
.proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:44px;}
.proof-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;}
.proof-num{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--green);line-height:1;margin-bottom:6px;}
.proof-label{font-size:13px;color:var(--muted);line-height:1.5;}

/* ===== TESTIMONIALS ===== */
.testi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px;}
.testi-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;}
.testi-card.empty{border-style:dashed;opacity:.5;}
.testi-stars{color:var(--accent);font-size:14px;margin-bottom:12px;letter-spacing:2px;}
.testi-text{font-size:14px;line-height:1.75;color:#b8c9bc;margin-bottom:16px;font-style:italic;}
.testi-author{display:flex;align-items:center;gap:10px;}
.testi-avatar{width:36px;height:36px;border-radius:50%;background:var(--glow);border:1px solid rgba(37,211,102,.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.testi-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.testi-role{font-size:11.5px;color:var(--muted);}
.testi-empty-msg{font-size:13px;color:var(--muted);text-align:center;padding:20px 0;line-height:1.7;}

/* ===== FAQ ===== */
.faq-list{margin-top:36px;display:flex;flex-direction:column;gap:10px;}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.faq-q{width:100%;background:none;border:none;padding:18px 20px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .2s;}
.faq-q:hover{background:rgba(255,255,255,.03);}
.faq-icon{font-size:18px;color:var(--green);flex-shrink:0;transition:transform .25s;}
.faq-icon.open{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;font-size:14px;color:var(--muted);line-height:1.7;padding:0 20px;}
.faq-a.open{max-height:200px;padding:0 20px 18px;}

/* ===== FINAL CTA ===== */
.final-cta{background:linear-gradient(135deg,#0a1f0f 0%,#0f2a14 50%,#091409 100%);border-top:1px solid rgba(37,211,102,.2);text-align:center;}
.final-cta-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(37,211,102,0.1) 0%,transparent 65%);pointer-events:none;}
.final-cta-content{position:relative;z-index:1;}
.final-cta h2{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-0.02em;margin-bottom:16px;}
.final-cta h2 em{font-style:normal;color:var(--green);}
.final-cta p{color:var(--muted);font-size:16px;line-height:1.7;max-width:480px;margin:0 auto 32px;}
.final-cta-note{margin-top:14px;font-size:12px;color:var(--muted);}

@media(max-width:640px){
  .proof-grid{grid-template-columns:1fr 1fr;}
  .testi-grid{grid-template-columns:1fr;}
  .phone-wrap{gap:36px;}
}


/* ===== DESIGN POLISH ===== */

/* Gradient borders on cards */
.prob-card,.feat-card,.who-card,.use-card,.price-card,.proof-card,.testi-card,.step-card,.ba-card.good{
  position:relative;
}
.prob-card::before,.feat-card::before,.proof-card::before,.step-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;
  background:linear-gradient(135deg,rgba(37,211,102,0.0),rgba(37,211,102,0.18),rgba(37,211,102,0.0));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.prob-card:hover::before,.feat-card:hover::before,.proof-card:hover::before,.step-card:hover::before{opacity:1;}

/* Bigger bolder section headings */
.sec-title{
  font-size:clamp(2rem,5vw,3.2rem);
  letter-spacing:-0.03em;
  background:linear-gradient(135deg,#eef2ef 30%,#8fb89a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.sec-title em{
  background:linear-gradient(135deg,#25D366,#1aab52);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Hero heading gradient */
.hero h1{
  background:linear-gradient(135deg,#ffffff 0%,#c8e6d0 60%,#25D366 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero h1 em{
  background:linear-gradient(135deg,#25D366,#1aab52);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Improved button gradient */
.btn-main{
  background:linear-gradient(135deg,#25D366 0%,#1db954 100%);
  box-shadow:0 4px 20px rgba(37,211,102,0.3);
}
.btn-main:hover{
  background:linear-gradient(135deg,#2ee87a 0%,#25D366 100%);
  box-shadow:0 8px 32px rgba(37,211,102,0.45);
  transform:translateY(-3px);
}

/* Generate button upgrade */
.btn-gen{
  background:linear-gradient(135deg,#25D366 0%,#1db954 100%);
  box-shadow:0 4px 20px rgba(37,211,102,0.25);
  font-size:17px;
  padding:17px 20px;
  letter-spacing:0.01em;
}
.btn-gen:hover{
  box-shadow:0 10px 36px rgba(37,211,102,0.4);
}

/* Phone mockup glow */
.phone-frame{
  box-shadow:0 0 0 2px #2a2a2a,0 24px 80px rgba(0,0,0,0.7),0 0 60px rgba(37,211,102,0.15),0 0 120px rgba(37,211,102,0.06);
}

/* Stats number polish */
.proof-num{
  font-size:3rem;
  background:linear-gradient(135deg,#25D366,#7fffb2);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
.proof-card{
  background:linear-gradient(145deg,#131813,#161d17);
  transition:transform .2s,border-color .2s;
}
.proof-card:hover{
  transform:translateY(-4px);
  border-color:rgba(37,211,102,.3);
}

/* FAQ polish */
.faq-q{
  font-size:15px;
  padding:20px 22px;
}
.faq-a{
  font-size:14.5px;
  line-height:1.75;
}
.faq-item{
  transition:border-color .2s;
}
.faq-item:hover{
  border-color:rgba(37,211,102,.2);
}

/* Section tag polish */
.sec-tag{
  font-size:11.5px;
  padding:5px 16px;
  letter-spacing:0.1em;
}

/* Final CTA button pill */
.final-cta .btn-main{
  border-radius:100px;
  font-size:17px;
  padding:18px 36px;
  box-shadow:0 8px 40px rgba(37,211,102,0.4);
}

/* Improved card hover transitions */
.who-card,.use-card,.feat-card{transition:border-color .25s,transform .25s,box-shadow .25s;}
.who-card:hover,.use-card:hover{box-shadow:0 8px 28px rgba(37,211,102,0.1);}
.feat-card:hover{box-shadow:0 8px 28px rgba(37,211,102,0.08);}

/* Nav logo box glow on hover */
.nav-logo:hover .nav-logo-box{box-shadow:0 4px 20px rgba(37,211,102,0.5);}

/* Before/After card polish */
.ba-card.good{background:linear-gradient(145deg,#0d1f11,#111a13);}
.ba-card.bad{background:linear-gradient(145deg,#1a1010,#150e0e);}

/* Testi cards */
.testi-card.empty{background:linear-gradient(145deg,#0f1410,#131813);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:rgba(37,211,102,0.25);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(37,211,102,0.4);}

/* Count-up animation for stats */
@keyframes countUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.proof-num.visible{animation:countUp .6s ease both;}

.ns-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}

  border-radius:50%;

/* ===== SUITE TOOLTIP ===== */
.suite-pill[title]{position:relative;}
.suite-pill[title]:active::after,
.suite-pill[title]:focus::after{
  content:attr(title);
  position:absolute;
  top:calc(100%% + 8px);
  left:50%%;
  transform:translateX(-50%%);
  background:rgba(13,24,15,0.98);
  border:1px solid rgba(37,211,102,0.25);
  color:#b8c9bc;
  font-size:11px;
  font-weight:400;
  padding:8px 12px;
  border-radius:10px;
  white-space:nowrap;
  z-index:999;
  pointer-events:none;
  max-width:240px;
  white-space:normal;
  text-align:center;
  line-height:1.5;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}

/* Desktop hover */
@media(hover:hover){
  .suite-pill[title]:hover::after{
    content:attr(title);
    position:absolute;
    top:calc(100%% + 8px);
    left:50%%;
    transform:translateX(-50%%);
    background:rgba(13,24,15,0.98);
    border:1px solid rgba(37,211,102,0.25);
    color:#b8c9bc;
    font-size:11px;
    padding:8px 12px;
    border-radius:10px;
    white-space:normal;
    z-index:999;
    pointer-events:none;
    max-width:240px;
    text-align:center;
    line-height:1.5;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
}

/* ===== FILE/IMAGE UPLOAD ===== */
.upload-section{margin:14px 0;}
.upload-tabs{display:flex;gap:8px;margin-bottom:10px;}
.upload-tab{flex:1;padding:8px;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.upload-tab.active{background:var(--glow);border-color:rgba(37,211,102,.4);color:var(--green);}
.upload-drop{border:2px dashed rgba(37,211,102,0.2);border-radius:14px;padding:18px 16px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(37,211,102,0.02);position:relative;}
.upload-drop:hover,.upload-drop.drag{border-color:rgba(37,211,102,0.5);background:rgba(37,211,102,0.06);}
.upload-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-drop-icon{font-size:28px;margin-bottom:6px;}
.upload-drop-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.upload-drop-sub{font-size:11px;color:var(--muted);}
.upload-result{display:none;margin-top:10px;}
.upload-result.show{display:block;}
.upload-preview{width:100%;max-height:160px;object-fit:cover;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;}
.upload-file-preview{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.upload-file-icon{font-size:28px;flex-shrink:0;}
.upload-file-name{font-size:12px;color:var(--text);flex:1;word-break:break-all;}
.upload-link-row{display:flex;gap:8px;align-items:center;}
.upload-link{flex:1;padding:9px 12px;background:var(--glow);border:1px solid rgba(37,211,102,.25);border-radius:10px;font-size:11px;color:var(--green);word-break:break-all;text-decoration:none;}
.upload-remove{padding:9px 12px;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:10px;font-size:12px;color:#ff6b6b;cursor:pointer;white-space:nowrap;}
.upload-status{display:none;align-items:center;gap:10px;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--muted);margin-top:8px;}
.upload-status.show{display:flex;}
/* keep old classes working */
.img-upload-zone{display:none;}
.img-uploading{display:none;}
.img-preview-wrap{display:none;}

/* ===== BOTTOM NAV ===== */
function bnav(tab){
  document.querySelectorAll('.bnav-item').forEach(i=>i.classList.remove('on'));
  document.getElementById('bn-'+tab).classList.add('on');
  if(tab==='home'){ window.scrollTo({top:0,behavior:'smooth'}); return; }
  if(tab==='generate'){
    const el=document.getElementById('tool');
    if(el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'});
    return;
  }
  if(tab==='reply'){
    const el=document.getElementById('smartReplySection');
    if(el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'});
    return;
  }
  if(tab==='about'){
    window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
    return;
  }
}
window.addEventListener('scroll',function(){
  const y=window.scrollY;
  const tool=document.getElementById('tool');
  const reply=document.getElementById('smartReplySection');
  let tab='home';
  if(tool && y>=tool.offsetTop-100) tab='generate';
  if(reply && y>=reply.offsetTop-100) tab='reply';
  if(y+window.innerHeight>=document.body.scrollHeight-300) tab='about';
  document.querySelectorAll('.bnav-item').forEach(i=>i.classList.remove('on'));
  const el=document.getElementById('bn-'+tab);
  if(el) el.classList.add('on');
},{passive:true});

/* Count-up on scroll */
(function(){
  const nums = document.querySelectorAll('.proof-num');
  if(!nums.length) return;
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  },{threshold:0.3});
  nums.forEach(n=>obs.observe(n));
})();
